<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>싹싹 지우개 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bgm" src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=lofi-study-112191.mp3" loop></audio>
    <audio id="sfxErase" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_73f05dbd4e.mp3?filename=swipe-102542.mp3"></audio>
    <audio id="sfxSuccess" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=success-1-6297.mp3"></audio>

    <div id="setupArea" class="setup-area">
        <h2>선생님 설정 화면 (문제를 낼 사진을 올려주세요)</h2>
        <input type="file" id="imageLoader" accept="image/*" multiple>
        <p id="uploadStatus"></p>
        <button id="btnInitStart" class="setup-btn" style="display: none;">게임 화면으로 이동</button>
    </div>

    <div class="app-container" id="appContainer" style="display: none;">
        <header>
            <div class="header-left">상세보기</div>
            <div class="header-right">
                <button id="btnResetImages" class="reset-btn">🔄 사진 초기화</button>
                <div class="page-indicator"><span id="currentPage">1</span> / <span id="totalPage">3</span></div>
                <button class="icon-btn">🧽</button>
                <button class="icon-btn">🔊</button>
                <div class="header-checks">
                    <label><input type="checkbox" id="bgmCheck" checked> 배경음</label>
                    <label><input type="checkbox" id="sfxCheck" checked> 효과음</label>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="bg-dot left"></div>
            <div class="bg-dot right"></div>

            <div id="startScreen" class="screen-content">
                <div class="cloud-bg">
                    <h1 class="main-title">싹싹 🧽<br>지우개 게임</h1>
                    <p class="sub-title">가려진 곳을 🧽로 지워 무슨 그림인지 맞혀 보세요!</p>
                </div>
                <button id="btnStartGame" class="start-btn">시작하기</button>
            </div>

            <div id="gameScreen" class="screen-content" style="display: none;">
                <div class="question-banner">
                    <h2>어떤 모습일까?</h2>
                </div>
                
                <div class="play-area">
                    <button id="btnPrev" class="nav-arrow left-arrow">❮</button>
                    
                    <div class="canvas-wrapper">
                        <canvas id="imageCanvas"></canvas>
                        <canvas id="eraserCanvas"></canvas>
                        <div id="imageLabel" class="image-label" style="display: none;">사진1</div>
                    </div>

                    <div class="eraser-slider-container">
                        <label for="eraserSize">지우개<br>크기</label>
                        <input type="range" id="eraserSize" min="10" max="150" value="60" orient="vertical">
                    </div>

                    <button id="btnNext" class="nav-arrow right-arrow">❯</button>
                </div>

                <div class="bottom-controls">
                    <button id="btnCheckAnswer" class="check-btn">✔️ 정답 확인</button>
                    <div id="actionButtons" class="action-buttons" style="display: none;">
                        <button id="btnMoreGames" class="end-btn">게임 더 보기</button>
                        <button id="btnRetry" class="end-btn">↻ 다시 하기</button>
                    </div>
                </div>
            </div>
        </main>
        
        <footer id="numberFooter" class="bottom-tabs" style="display: none;">
            <div class="footer-left">
                <span class="photo-text">사진 선택 :</span>
                <div id="numberSelectors" class="number-selectors">
                    </div>
            </div>
            <div class="footer-right-menus">
                <span class="tip-btn">TIP 문제 미리 보기</span>
            </div>
        </footer>

        <div id="completionPopup" class="popup" style="display: none;">
            <div class="popup-content">
                <div class="cat-sticker">😻</div>
                <h2>게임을 완수하였습니다</h2>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
